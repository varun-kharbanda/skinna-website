<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — SKINNA</title>
<meta name="description" content="The page you were looking for couldn't be found. Head back to SKINNA.">
<meta name="robots" content="noindex">

<!-- Favicon -->
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1A1A2E;
    --navy-mid: #16213E;
    --purple: #6C63FF;
    --purple-light: #A29BFE;
    --gray-300: #C8C7E0;
    --gray-400: #A6A6BD;
    --white: #FFFFFF;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: linear-gradient(160deg, var(--navy) 0%, var(--navy-mid) 55%, #1f2747 100%);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    overflow: hidden;
    position: relative;
  }
  body::before {
    content: '';
    position: absolute;
    top: -200px; right: -160px;
    width: 560px; height: 560px;
    background: radial-gradient(circle, rgba(108,99,255,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .wrap { position: relative; z-index: 1; max-width: 480px; }
  .logo {
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 22px;
    color: var(--white);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 40px;
  }
  .logo-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: linear-gradient(135deg, var(--purple), var(--purple-light));
  }
  .code {
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 96px;
    line-height: 1;
    background: linear-gradient(135deg, var(--purple-light), var(--purple));
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 16px;
  }
  h1 {
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    color: var(--white);
    font-size: 28px;
    margin-bottom: 12px;
    letter-spacing: -0.02em;
  }
  p { color: var(--gray-300); font-size: 16px; margin-bottom: 32px; }
  .btn {
    display: inline-block;
    background: var(--purple);
    color: var(--white);
    text-decoration: none;
    font-weight: 700;
    font-size: 15px;
    padding: 14px 30px;
    border-radius: 999px;
    box-shadow: 0 8px 30px rgba(108, 99, 255, 0.35);
    transition: transform 0.2s;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn:focus-visible { outline: 3px solid var(--purple-light); outline-offset: 3px; }
  .links { margin-top: 28px; font-size: 14px; }
  .links a { color: var(--gray-400); text-decoration: none; margin: 0 10px; }
  .links a:hover { color: var(--purple-light); }
  .links a:focus-visible { outline: 2px solid var(--purple-light); outline-offset: 3px; border-radius: 4px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo"><span class="logo-dot"></span>SKINNA</div>
    <div class="code">404</div>
    <h1>This page took a day off.</h1>
    <p>We couldn't find what you were looking for — but your best look is still just one photo away.</p>
    <a class="btn" href="/">Back to home</a>
    <div class="links">
      <a href="/support.html">Support</a>
      <a href="/privacy.html">Privacy</a>
      <a href="/terms.html">Terms</a>
    </div>
  </div>
</body>
</html>
